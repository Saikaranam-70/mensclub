version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: salonpro_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: salon_db

  backend:
    build: ./backend
    container_name: salonpro_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/salon_db
      PORT: 5000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: salonpro_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
